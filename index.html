    function rowClass(status) {
      if (status === '已完成') return 'done';
      if (status === '進行中') return 'in-progress';
      return '';
    }

    function renderTableHead() {
      const thead = document.getElementById('tableHead');
      if (!thead || !currentChecklist) return;
      const cols = getFormColumns(currentChecklist);
      const actionTh = canEditTable ? '<th class="action-cell-head" style="width: 60px;"></th>' : '';
      const ths = cols
        .map((c, i) => {
          const extra = i >= 1 ? ' col-cell branch col-mobile-hide' : ' col-cell';
          return `<th class="${extra.trim()}" data-col-id="${escAttr(c.id)}">${escHtml(c.label)}</th>`;
        })
        .join('');
      thead.innerHTML = `<tr>${ths}<th>狀態</th>${actionTh}</tr>`;
    }

    function renderTable() {
      renderTableHead();
      const tbody = document.getElementById('tableBody');
      const cols = getFormColumns(currentChecklist);
      const actionCol = canEditTable ? 1 : 0;
      const colSpan = cols.length + 1 + actionCol;

      tbody.className = canEditTable && ownerCellEditMode ? 'owner-editing-cells' : '';
      tbody.innerHTML = '';
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${colSpan}" class="empty-state">尚無進度項目</td></tr>`;
        return;
      }

      data.forEach((row) => {
        const tr = document.createElement('tr');
        tr.setAttribute('data-row-id', String(row.id));
        const cls = rowClass(row.status);
        if (cls) tr.classList.add(cls);
        if (highlightNewRowId != null && String(row.id) === String(highlightNewRowId)) {
          tr.classList.add('row-newly-added');
        }

        let tds = '';
        cols.forEach((c, i) => {
          const tdCls = 'col-cell' + (i >= 1 ? ' branch col-mobile-hide' : '');
          const val = getCellValue(row, c.id);
          const ownerEditingCells = canEditTable && ownerCellEditMode;
          const cellHtml = ownerEditingCells ? renderOwnerCellHtml(c, row, i) : renderGuestCellHtml(c, val, i);
          tds += `<td class="${tdCls}">${cellHtml}</td>`;
        });

        let statusCell;
        if (canEditTable) {
          const options = STATUSES.map((s) => `<option value="${s}" ${row.status === s ? 'selected' : ''}>${s}</option>`).join('');
          statusCell = `<select class="status-select" data-id="${row.id}" data-status="${row.status}" onchange="changeStatus(${row.id}, this)">${options}</select>`;
        } else {
          statusCell = `<span class="status-badge ${row.status}">${row.status}</span>`;
        }

        const actionCell = canEditTable
          ? `<td class="action-cell"><button class="btn-delete" onclick="deleteRow(${row.id})" title="刪除">✕</button></td>`
          : '';

        tr.innerHTML = tds + `<td class="status-cell">${statusCell}</td>` + actionCell;
        tbody.appendChild(tr);
      });
    }

    window.changeStatus = async (id, select) => {

    const SAVE_FIELD_DEBOUNCE_MS = 450;
    const saveFieldDebounceTimers = new Map();

    function saveFieldDebounceKey(rowId, colId) {
      return String(rowId) + '\x1e' + String(colId);
    }

    window.scheduleSaveField = function (rowId, colId, input) {
      const key = saveFieldDebounceKey(rowId, colId);
      const prev = saveFieldDebounceTimers.get(key);
      if (prev) clearTimeout(prev);
      saveFieldDebounceTimers.set(
        key,
        setTimeout(() => {
          saveFieldDebounceTimers.delete(key);
          void window.saveField(rowId, colId, input, { quiet: true });
        }, SAVE_FIELD_DEBOUNCE_MS)
      );
    };

    window.flushPendingCellSaves = async function () {
      for (const t of saveFieldDebounceTimers.values()) clearTimeout(t);
      saveFieldDebounceTimers.clear();
      const controls = document.querySelectorAll('#tableBody [data-cell-control]');
      const tasks = [];
      controls.forEach((el) => {
        const rowId = el.dataset.rowId;
        const colId = el.dataset.colId;
        if (rowId == null || colId === undefined || colId === '') return;
        const row = data.find((r) => String(r.id) === String(rowId));
        if (!row) return;
        const ft = normalizeFieldType(el.dataset.fieldType);
        const newVal = readValueFromCellControl(el, ft);
        const curVal = getCellRawForType(row, colId, ft);
        if (valuesEqualForFieldType(curVal, newVal, ft)) return;
        tasks.push(window.saveField(rowId, colId, el, { quiet: true }));
      });
      if (tasks.length === 0) return true;
      const results = await Promise.all(tasks);
      return results.every((r) => r === true);
    };

    async function persistCellChange(row, colId, newVal, quiet) {
      const col = getColumnById(colId);
      const ft = col ? col.fieldType : 'text';
      const curVal = getCellRawForType(row, colId, ft);
      if (valuesEqualForFieldType(curVal, newVal, ft)) return true;
      const cells = { ...(row.cells || legacyCellsFromRow(row)) };
      cells[colId] = newVal;
      const payload = { ...payloadFromCells(cells), updated_at: new Date().toISOString() };
      let { error } = await supabase.from('mp_tool_checklist').update(payload).eq('id', row.id);
      if (error && /cells|column/i.test(error.message || '')) {
        const legacy = {};
        if (colId === 'tool_version') legacy.tool_version = newVal;
        if (colId === 'branch') legacy.branch = newVal;
        if (Object.keys(legacy).length) {
          ({ error } = await supabase
            .from('mp_tool_checklist')
            .update({ ...legacy, updated_at: new Date().toISOString() })
            .eq('id', row.id));
        }
      }
      if (!error) {
        row.cells = cells;
        if (colId === 'tool_version') row.tool_version = newVal;
        if (colId === 'branch') row.branch = newVal;
        if (!quiet) showToast('已自動儲存');
        return true;
      }
      return false;
    }

    async function saveTextareaModalToServer() {
      const m = document.getElementById('textareaCellModal');
      const rowId = m && m.dataset.editRowId;
      const colId = m && m.dataset.editColId;
      if (!rowId || !colId) return true;
      const row = data.find((r) => String(r.id) === String(rowId));
      if (!row) return true;
      const ta = document.getElementById('textareaCellModalInput');
      const newVal = String(ta ? ta.value : '').replace(/\r\n/g, '\n');
      const ok = await persistCellChange(row, colId, newVal, false);
      if (ok) {
        closeTextareaCellModal();
        renderTable();
      } else {
        showToast('⚠️ 儲存失敗');
      }
      return ok;
    }

      const modal = document.getElementById('textareaCellModal');
      if (modal && modal.classList.contains('is-open')) {
        const okModal = await saveTextareaModalToServer();
        if (!okModal) return;

        const flushOk = await window.flushPendingCellSaves();
        if (!flushOk) {
          showToast('⚠️ 尚有內容未成功儲存');

        }
      } catch (_e) {
        showToast('⚠️ 儲存時發生錯誤');

      ownerCellEditMode = false;
      syncListDetailToolbar();

      showToast('已儲存並返回檢視');

    function revertCellControl(el, row, colId, ft) {
      const cur = getCellRawForType(row, colId, ft);
      if (ft === 'checkbox') {
        el.checked = parseCheckboxStored(cur);
        return;
      }
      if (ft === 'date') {
        el.value = formatDateDisplayForCell(cur);
        return;
      }
      if (ft === 'textarea') {
        el.value = cur;
        return;
      }
      el.value = cur;
    }

    window.saveField = async (id, colId, input, opts) => {
      const quiet = opts && opts.quiet === true;
      const col = getColumnById(colId);
      const ft = col ? col.fieldType : 'text';
      const newVal = readValueFromCellControl(input, ft);
      const row = data.find((r) => String(r.id) === String(id));
      if (!row) return true;
      const curVal = getCellRawForType(row, colId, ft);
      if (valuesEqualForFieldType(curVal, newVal, ft)) return true;
      if (input.style) input.style.opacity = '0.5';
      const ok = await persistCellChange(row, colId, newVal, quiet);
      if (input.style) input.style.opacity = '1';
      if (ok) return true;
      revertCellControl(input, row, colId, ft);
      if (!quiet) showToast('⚠️ 儲存失敗');
      return false;
    };

          const modal = document.getElementById('textareaCellModal');
          if (modal && modal.classList.contains('is-open')) {
            const rowId = modal.dataset.editRowId;
            const colId = modal.dataset.editColId;
            if (rowId && colId) {
              const row = data.find((r) => String(r.id) === String(rowId));
              if (row) {
                const ta = document.getElementById('textareaCellModalInput');
                const newVal = String(ta ? ta.value : '').replace(/\r\n/g, '\n');
                const wOk = await persistCellChange(row, colId, newVal, true);
                if (!wOk) {
                  showToast('⚠️ 多行欄位尚未成功儲存');
                  return;
                }
              }
            }
            closeTextareaCellModal();
          }
          const ok = await window.flushPendingCellSaves();
          if (!ok) {
            showToast('⚠️ 尚有內容未成功儲存，請稍後再按回首頁');
            return;
          }
        } catch (_err) {
          showToast('⚠️ 儲存時發生錯誤');
          return;
        }
      }
      goHome();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden' && canEditTable && listId && ownerCellEditMode) {
        void window.flushPendingCellSaves();
      }
    });

    window.addEventListener('pagehide', () => {
      if (canEditTable && listId && ownerCellEditMode) {
        void window.flushPendingCellSaves();
      }
    });

    window.copyShareLink = () => {
      navigator.clipboard.writeText(window.location.href).then(() => showToast('✨ 共用網址已複製！')).catch(() => showToast('複製失敗'));
    };

    function updateProgress() {
      const total = data.length;
      const done = data.filter(r => r.status === '已完成').length;
      const inProg = data.filter(r => r.status === '進行中').length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = `已完成 ${done} / ${total}（${pct}%）` + (inProg > 0 ? `　進行中 ${inProg}` : '');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    })();
  </script>
</body>
</html>
